; ============================================================
; php.ini para proyecto GameHub (desarrollo local)
; ============================================================

; Ruta donde están los archivos .dll de las extensiones
; Ajusta esta ruta a tu instalación de PHP (ej: C:\xampp\php\ext)
extension_dir = "C:\php\ext"

; Habilitar extensiones para PostgreSQL
extension=pdo_pgsql
extension=pgsql

; Mostrar todos los errores (útil para desarrollo)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Configuración de zona horaria
date.timezone = America/Bogota